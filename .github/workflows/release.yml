name: Build And Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-macos:
    name: Build macOS (${{ runner.arch }})
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install cargo-bundle
        run: cargo install cargo-bundle --locked

      - name: Bundle macOS app
        run: |
          cargo bundle --release
          APP_PATH="$(ls -d target/release/bundle/osx/*.app | head -n 1)"
          mkdir -p dist
          ditto -c -k --sequesterRsrc --keepParent "$APP_PATH" "dist/Qingqi-macos-${{ runner.arch }}.zip"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: qingqi-macos-${{ runner.arch }}
          path: dist/Qingqi-macos-${{ runner.arch }}.zip

      - name: Release upload
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/Qingqi-macos-${{ runner.arch }}.zip

  build-windows:
    name: Build Windows (x86_64)
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build release
        run: cargo build --release

      - name: Package binary
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist
          Compress-Archive -Path target/release/qingqi.exe -DestinationPath dist/Qingqi-windows-x86_64.zip

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: qingqi-windows-x86_64
          path: dist/Qingqi-windows-x86_64.zip

      - name: Release upload
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/Qingqi-windows-x86_64.zip
