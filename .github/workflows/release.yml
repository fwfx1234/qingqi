name: Build And Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.os }}-${{ runner.arch }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            archive_ext: tar.gz
            binary_name: qingqi
          - os: macos-latest
            archive_ext: tar.gz
            binary_name: qingqi
          - os: windows-latest
            archive_ext: zip
            binary_name: qingqi.exe

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build release
        run: cargo build --release

      - name: Package (Unix)
        if: runner.os != 'Windows'
        run: |
          mkdir -p dist
          cp target/release/${{ matrix.binary_name }} dist/
          tar -czf qingqi-${{ runner.os }}-${{ runner.arch }}.${{ matrix.archive_ext }} -C dist ${{ matrix.binary_name }}

      - name: Package (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          Copy-Item "target/release/${{ matrix.binary_name }}" "dist/${{ matrix.binary_name }}"
          Compress-Archive -Path "dist/${{ matrix.binary_name }}" -DestinationPath "qingqi-${{ runner.os }}-${{ runner.arch }}.${{ matrix.archive_ext }}" -Force

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: qingqi-${{ runner.os }}-${{ runner.arch }}
          path: qingqi-${{ runner.os }}-${{ runner.arch }}.${{ matrix.archive_ext }}

      - name: Release upload
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: qingqi-${{ runner.os }}-${{ runner.arch }}.${{ matrix.archive_ext }}
